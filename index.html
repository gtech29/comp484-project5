<body>
  <main class="main">

      <p class="panel-text score-display" id="score"></p>
    </div>
    <section class="map" id="map">
      <!--  -->
      <gmp-map center="34.24010682535355, -118.52930071133025" zoom="17" map-id="d99504023f93f95a36ddf7f0"></gmp-map>

    </section>
  </main>
